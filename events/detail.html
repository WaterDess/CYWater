<!DOCTYPE html>
<html lang="en" data-root="../">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Event — CYWater</title>
  <meta name="description" content="CYWater events and conferences.">
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-page="events">

  <div id="site-header"></div>

  <main id="event-main">
    <!-- event-hero and body are injected by renderEvent() -->
  </main>

  <div id="site-footer"></div>
  <script src="../assets/js/content.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  /* ---------- Render an event from ?id= ---------- */
  (function () {
    "use strict";
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const E = window.CYWaterContent?.EVENTS || {};
    const data = E[id];

    const main = document.getElementById("event-main");

    // Missing or unknown id → redirect to events list
    if (!data) {
      window.location.replace("./index.html");
      return;
    }

    document.title = data.title + " — CYWater";

    function esc(s) {
      return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    function renderBlock(b) {
      switch (b.type) {
        case "p":      return '<p>' + b.text + '</p>';
        case "h2":     return '<h2>' + b.text + '</h2>';
        case "h3":     return '<h3>' + b.text + '</h3>';
        case "quote":  return '<blockquote>' + b.text + '</blockquote>';
        case "list":   return '<ul>' + b.items.map((i) => '<li>' + i + '</li>').join('') + '</ul>';
        case "figure": return '<figure><img src="../assets/img/' + b.src + '" alt="' + esc(b.caption || '') + '" loading="lazy">' + (b.caption ? '<figcaption>' + b.caption + '</figcaption>' : '') + '</figure>';
        case "gallery": return '<div class="article-gallery">' + b.items.map((it) => '<figure><img src="../assets/img/' + it.src + '" alt="' + esc(it.caption || '') + '" loading="lazy">' + (it.caption ? '<figcaption>' + it.caption + '</figcaption>' : '') + '</figure>').join('') + '</div>';
        default:       return '';
      }
    }

    const statusBadge = data.upcoming
      ? '<span class="badge badge-live">Upcoming</span>'
      : '<span class="badge badge-mute">Past</span>';

    const attendanceMeta = data.attendees
      ? '<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.5"/><path d="M2 21a7 7 0 0 1 14 0"/></svg>' + esc(data.attendees) + '</span>'
      : '';
    const eventPhoto = data.image
      ? '<figure class="event-photo" data-reveal><img src="../assets/img/' + esc(data.image) + '" alt="' + esc(data.imageAlt || data.title) + '"><figcaption>' + esc(data.imageAlt || data.title) + '</figcaption></figure>'
      : '';

    main.innerHTML =
      '<section class="event-hero">' +
        '<div class="container">' +
          '<div class="crumbs" style="color:rgba(255,255,255,.6)">' +
            '<a href="../index.html" style="color:rgba(255,255,255,.6)">Home</a><span>/</span>' +
            '<a href="./index.html" style="color:rgba(255,255,255,.6)">Events</a>' +
          '</div>' +
          '<span class="badge badge-teal" style="margin-bottom:var(--sp-3)">' + esc(data.format || 'Event') + '</span>' +
          '<h1>' + esc(data.title) + '</h1>' +
          '<div class="event-meta-row">' +
            '<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>' + esc(data.date) + '</span>' +
            '<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>' + esc(data.location) + '</span>' +
            attendanceMeta +
            statusBadge +
          '</div>' +
        '</div>' +
      '</section>' +
      '<section class="section">' +
        '<div class="container">' +
          '<div class="event-body">' +
            '<div>' +
              '<span class="eyebrow">About this event</span>' +
              '<p class="lead" style="margin:var(--sp-4) 0 var(--sp-5)" data-reveal>' + data.lead + '</p>' +
              eventPhoto +
              '<div class="prose" data-reveal>' +
                data.blocks.map(renderBlock).join('') +
              '</div>' +
              '<div style="text-align:center; margin-top:var(--sp-6)">' +
                '<a class="link" href="./index.html">Back to Events</a>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</section>';

    window.CYWaterReveal?.refresh(main);
  })();
  </script>
</body>
</html>
