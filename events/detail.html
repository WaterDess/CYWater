<!DOCTYPE html>
<html lang="en" data-root="../">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annual Meeting 2026 — CYWater</title>
  <meta name="description" content="Three days of talks, workshops and mentorship across hydrology, water quality and climate.">
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-page="events">

  <div id="site-header"></div>

  <main>
    <!-- hero -->
    <section class="event-hero">
      <div class="container">
        <div class="crumbs" style="color:rgba(255,255,255,.6)">
          <a href="../index.html" style="color:rgba(255,255,255,.6)" data-i18n="nav.home"></a><span>/</span>
          <a href="./index.html" style="color:rgba(255,255,255,.6)" data-i18n="nav.events"></a><span>/</span>
          <span style="color:#fff" data-i18n="events.detailBread"></span>
        </div>
        <span class="badge badge-teal" style="margin-bottom:var(--sp-3)" data-i18n="common.tagConference"></span>
        <h1 data-i18n="events.e1Title"></h1>
        <div class="event-meta-row">
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg><span data-i18n="events.detailDate"></span></span>
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg><span data-i18n="events.e1Loc"></span></span>
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.5"/><path d="M2 21a7 7 0 0 1 14 0"/></svg>~400 expected</span>
        </div>
      </div>
    </section>

    <!-- body -->
    <section class="section">
      <div class="container">
        <div class="event-body">

          <!-- left: content -->
          <div>
            <div class="media-frame" style="aspect-ratio:16/7; margin-bottom:var(--sp-7)" data-reveal>
              <img src="../assets/img/photos/conference-room.jpg" alt="Conference venue" loading="lazy">
            </div>

            <span class="eyebrow" data-i18n="events.detailAbout"></span>
            <p class="lead" style="margin:var(--sp-4) 0 var(--sp-5)" data-reveal>
              <span data-i18n="events.detailLead"></span>
            </p>
            <p data-reveal><span data-i18n="events.detailBody"></span></p>

            <!-- schedule tabs -->
            <h2 style="margin-top:var(--sp-8); margin-bottom:var(--sp-4)" data-i18n="events.detailSchedule"></h2>
            <div data-tabs data-reveal>
              <div class="schedule-tabs" role="tablist">
                <button class="schedule-tab is-active" data-tab="d1" role="tab" data-i18n="events.day1"></button>
                <button class="schedule-tab" data-tab="d2" role="tab" data-i18n="events.day2"></button>
                <button class="schedule-tab" data-tab="d3" role="tab" data-i18n="events.day3"></button>
              </div>

              <div data-panel="d1" class="is-active">
                <div class="schedule-item">
                  <div class="schedule-time">09:00 – 10:00</div>
                  <div><h4 data-i18n="events.s1T"></h4><p data-i18n="events.s1D"></p></div>
                </div>
                <div class="schedule-item">
                  <div class="schedule-time">10:30 – 12:30</div>
                  <div><h4 data-i18n="events.s2T"></h4><p data-i18n="events.s2D"></p></div>
                </div>
                <div class="schedule-item">
                  <div class="schedule-time">14:00 – 17:00</div>
                  <div><h4 data-i18n="events.s3T"></h4><p data-i18n="events.s3D"></p></div>
                </div>
              </div>

              <div data-panel="d2">
                <div class="schedule-item">
                  <div class="schedule-time">09:00 – 12:30</div>
                  <div><h4 data-i18n="events.s4T"></h4><p data-i18n="events.s4D"></p></div>
                </div>
                <div class="schedule-item">
                  <div class="schedule-time">14:00 – 16:00</div>
                  <div><h4 data-i18n="events.s5T"></h4><p data-i18n="events.s5D"></p></div>
                </div>
              </div>

              <div data-panel="d3">
                <div class="schedule-item">
                  <div class="schedule-time">09:00 – 12:00</div>
                  <div><h4 data-i18n="events.s6T"></h4><p data-i18n="events.s6D"></p></div>
                </div>
                <div class="schedule-item">
                  <div class="schedule-time">14:00 – 15:30</div>
                  <div><h4 data-i18n="events.s7T"></h4><p data-i18n="events.s7D"></p></div>
                </div>
              </div>
            </div>

            <!-- speakers -->
            <h2 style="margin-top:var(--sp-8); margin-bottom:var(--sp-5)" data-i18n="events.detailSpeakers"></h2>
            <div class="speaker-grid">
              <div class="speaker-card" data-reveal>
                <div class="avatar"><div class="avatar-initials">LZ</div></div>
                <div class="speaker-name">Dr. Lin Zhao</div>
                <div class="speaker-affil">Tsinghua University</div>
              </div>
              <div class="speaker-card" data-reveal>
                <div class="avatar"><div class="avatar-initials">DK</div></div>
                <div class="speaker-name">Prof. David Kim</div>
                <div class="speaker-affil">Stanford University</div>
              </div>
              <div class="speaker-card" data-reveal>
                <div class="avatar"><div class="avatar-initials">HS</div></div>
                <div class="speaker-name">Dr. Hua Sun</div>
                <div class="speaker-affil">Chinese Academy of Sciences</div>
              </div>
              <div class="speaker-card" data-reveal>
                <div class="avatar"><div class="avatar-initials">AB</div></div>
                <div class="speaker-name">Dr. Anna Brooks</div>
                <div class="speaker-affil">ETH Zürich</div>
              </div>
            </div>
          </div>

          <!-- right: sticky registration card -->
          <aside>
            <div class="event-side-card" data-reveal>
              <div class="price" data-i18n="common.free"></div>
              <p class="tier-cycle" data-i18n="events.detailMemberPrice"></p>
              <div class="sep"></div>
              <div class="price">$30</div>
              <p class="tier-cycle" data-i18n="events.detailNonMemberPrice"></p>
              <div class="sep"></div>
              <ul>
                <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 6 9 17l-5-5"/></svg><span data-i18n="events.inc1"></span></li>
                <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 6 9 17l-5-5"/></svg><span data-i18n="events.inc2"></span></li>
                <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 6 9 17l-5-5"/></svg><span data-i18n="events.inc3"></span></li>
              </ul>
              <button class="btn btn-accent btn-block" style="margin-top:var(--sp-5)" data-modal-open="regModal" data-i18n="common.register"></button>
              <p class="field-hint" style="text-align:center; margin-top:.6rem">128 <span data-i18n="events.seatsLeft"></span></p>
            </div>
          </aside>

        </div>
      </div>
    </section>
  </main>

  <!-- ============ Registration modal ============ -->
  <div class="modal-overlay" id="regModal" role="dialog" aria-modal="true" aria-labelledby="regTitle">
    <div class="modal">
      <div class="modal-head">
        <h3 id="regTitle" style="font-size:var(--fs-md)" data-i18n="reg.title"></h3>
        <button class="modal-close" data-modal-close aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">

        <div class="js-wizard">
          <div class="form-progress" aria-hidden="true">
            <span class="is-active"></span><span></span><span></span>
          </div>

          <!-- step 1 -->
          <div class="form-step is-active" data-step="1">
            <h4 style="font-family:var(--font-body); margin-bottom:var(--sp-4)" data-i18n="reg.step1Title"></h4>
            <div class="field-row">
              <div class="field">
                <label class="field-label" data-i18n="reg.firstName"></label>
                <input class="input" name="firstName" required>
              </div>
              <div class="field">
                <label class="field-label" data-i18n="reg.lastName"></label>
                <input class="input" name="lastName" required>
              </div>
            </div>
            <div class="field">
              <label class="field-label" data-i18n="reg.email"></label>
              <input class="input" type="email" name="email" required>
            </div>
            <div class="field">
              <label class="field-label" data-i18n="reg.org"></label>
              <input class="input" name="org">
            </div>
          </div>

          <!-- step 2 -->
          <div class="form-step" data-step="2">
            <h4 style="font-family:var(--font-body); margin-bottom:var(--sp-4)" data-i18n="reg.step2Title"></h4>
            <div class="field">
              <label class="field-label" data-i18n="reg.ticket"></label>
              <select class="select" name="ticket" required>
                <option value="member" data-i18n="reg.ticketMember"></option>
                <option value="nonmember" data-i18n="reg.ticketNonMember"></option>
                <option value="student" data-i18n="reg.ticketStudent"></option>
              </select>
            </div>
          </div>

          <!-- step 3 -->
          <div class="form-step" data-step="3">
            <h4 style="font-family:var(--font-body); margin-bottom:var(--sp-2)" data-i18n="reg.step3Title"></h4>
            <p class="field-hint" style="margin-bottom:var(--sp-4)" data-i18n="reg.reviewNote"></p>
            <div class="js-confirm-summary"></div>
          </div>

          <div class="form-nav">
            <button class="btn btn-ghost js-prev" type="button" style="visibility:hidden" data-i18n="common.previous"></button>
            <button class="btn btn-accent js-next" type="button" data-i18n="common.next"></button>
            <button class="btn btn-accent js-done" type="button" style="display:none" data-i18n="common.continue"></button>
          </div>
        </div>

        <!-- success -->
        <div class="js-success">
          <div class="check-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <p style="font-family:var(--font-display); font-size:var(--fs-lg); margin-bottom:.5rem" data-i18n="reg.successTitle"></p>
          <p class="field-hint" data-i18n="reg.confirmation"></p>
          <button class="btn btn-outline btn-block" style="margin-top:var(--sp-4)" data-modal-close data-i18n="reg.done"></button>
        </div>

      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/register.js"></script>
</body>
</html>
