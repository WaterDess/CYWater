<!DOCTYPE html>
<html lang="en" data-root="../">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Events — CYWater</title>
  <meta name="description" content="CYWater Annual Meetings and the Annual Gathering during the AGU Fall Meeting.">
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css?v=20260719-6">
  <link rel="stylesheet" href="../assets/css/components.css?v=20260719-6">
  <link rel="stylesheet" href="../assets/css/pages.css?v=20260719-6">
</head>
<body data-page="events">

  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow" style="color:var(--teal-soft)">Events</span>
        <h1>CYWater Annual Meeting 2026.</h1>
        <p class="lead">The International Association of Contemporary Young Scholars in Water Sciences Annual Meeting 2026 will take place in Nanjing, China, from 16 to 18 October. Registration will open in August.</p>
      </div>
    </section>

    <section class="section">
      <div class="container container-narrow">
        <div id="events-main"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="../assets/js/content.js?v=20260719-6"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  (function () {
    "use strict";
    const E = window.CYWaterContent?.EVENTS || {};
    const EL = window.CYWaterContent?.EVENT_LIST || [];
    const main = document.getElementById("events-main");
    if (!main || !EL.length) return;

    const esc = (value) => String(value || "").replace(/[&<>"]/g, (char) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;"
    })[char]);
    const yearOf = (date) => /(\d{4})/.exec(date)?.[1] || date;

    function renderItems(items) {
      return items.map((item) => {
        const event = E[item.id];
        if (!event) return "";
        const media = event.image
          ? `<img src="../assets/img/${esc(event.image)}" alt="${esc(event.imageAlt)}" loading="lazy">`
          : `<span class="event-year-mark">${esc(yearOf(event.date))}</span>`;
        const badge = item.status === "upcoming" ? "Upcoming" : "Archive";
        const mediaClass = event.archiveImageFocus === "lower" ? " is-focus-lower" : "";
        return `<a class="event-archive-row" href="./detail.html?id=${encodeURIComponent(item.id)}" data-reveal>` +
          `<span class="event-archive-media${mediaClass}">${media}</span>` +
          `<span class="event-archive-copy">` +
            `<span class="badge ${item.status === "upcoming" ? "badge-live" : "badge-mute"}">${badge}</span>` +
            `<h3>${esc(event.title)}</h3>` +
            `<span class="meta">${esc(event.date)} · ${esc(event.location)}</span>` +
            `<span class="event-archive-lead">${esc(event.lead)}</span>` +
          `</span><span class="link">View details</span></a>`;
      }).join("");
    }

    const meetings = EL.filter((item) => item.category === "meeting");
    const gatherings = EL.filter((item) => item.category === "gathering");
    main.innerHTML =
      `<section aria-labelledby="annual-meetings-title">` +
        `<div class="section-head"><span class="eyebrow">Conference series</span><h2 id="annual-meetings-title">Annual Meetings</h2></div>` +
        `<div class="event-archive-list">${renderItems(meetings)}</div>` +
      `</section>` +
      `<section id="annual-gathering" class="event-series-section" aria-labelledby="annual-gathering-title">` +
        `<div class="section-head"><span class="eyebrow">AGU tradition</span><h2 id="annual-gathering-title">Annual Gathering</h2></div>` +
        `<div class="event-archive-list">${renderItems(gatherings)}</div>` +
      `</section>`;

    window.CYWaterReveal?.refresh(main);
  })();
  </script>
</body>
</html>
