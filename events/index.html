<!DOCTYPE html>
<html lang="en" data-root="../">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — CYWater</title>
  <meta name="description" content="Webinars, workshops and the CYWater annual meeting — most free, all bilingual.">
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-page="events">

  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow" style="color:var(--teal-soft)" data-i18n="events.heroEyebrow"></span>
        <h1 data-i18n="events.heroTitle"></h1>
        <p class="lead" data-i18n="events.heroLead"></p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="events-layout">

          <!-- list -->
          <div>
            <h2 style="margin-bottom:var(--sp-4)" data-i18n="events.upcoming"></h2>

            <a class="event-row" href="./detail.html" data-reveal style="text-decoration:none">
              <div class="event-date"><div class="day">2025</div><div class="mon" style="font-size:var(--fs-xs); letter-spacing:.1em">Q4</div></div>
              <div class="event-info">
                <span class="badge badge-teal" data-i18n="common.tagConference"></span>
                <h3 data-i18n="events.e1Title"></h3>
                <div class="meta">
                  <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg><span data-i18n="events.e1City"></span></span>
                  <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span data-i18n="events.e1Dur"></span></span>
                  <span><span class="badge badge-live" style="margin-left:.3rem" data-i18n="events.tagJoint"></span></span>
                </div>
              </div>
              <span class="btn btn-outline" data-i18n="common.learnMore"></span>
            </a>

            <a class="event-row" href="./detail.html" data-reveal style="text-decoration:none">
              <div class="event-date"><div class="day">2025</div><div class="mon" style="font-size:var(--fs-xs); letter-spacing:.1em">Q4</div></div>
              <div class="event-info">
                <span class="badge badge-teal" data-i18n="common.tagAward"></span>
                <h3 data-i18n="events.e2Title"></h3>
                <div class="meta">
                  <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span data-i18n="events.e2Time"></span></span>
                  <span><span class="badge badge-live" style="margin-left:.3rem" data-i18n="events.tagAnnual"></span></span>
                </div>
              </div>
              <span class="btn btn-outline" data-i18n="common.learnMore"></span>
            </a>

            <a class="event-row" href="https://mp.weixin.qq.com/s/as1-T-vfeAywEoYh-AQ2pA" target="_blank" rel="noopener" data-reveal style="text-decoration:none">
              <div class="event-date"><div class="day">2024</div><div class="mon" style="font-size:var(--fs-xs); letter-spacing:.1em">AUG</div></div>
              <div class="event-info">
                <span class="badge badge-teal" data-i18n="common.tagConference"></span>
                <h3 data-i18n="events.e3Title"></h3>
                <div class="meta">
                  <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg><span data-i18n="events.e3Loc"></span></span>
                  <span data-i18n="events.e3Meta"></span>
                </div>
              </div>
              <span class="btn btn-outline" data-i18n="common.learnMore"></span>
            </a>

            <a class="event-row" href="https://mp.weixin.qq.com/s/RJ4docc3w9XTYktIYB1cGg" target="_blank" rel="noopener" data-reveal style="text-decoration:none">
              <div class="event-date"><div class="day">2022</div><div class="mon" style="font-size:var(--fs-xs); letter-spacing:.1em">AUG</div></div>
              <div class="event-info">
                <span class="badge badge-teal" data-i18n="common.tagConference"></span>
                <h3 data-i18n="events.e4Title"></h3>
                <div class="meta">
                  <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg><span data-i18n="events.e4Loc"></span></span>
                  <span><span class="badge badge-live" style="margin-left:.3rem" data-i18n="common.online"></span></span>
                </div>
              </div>
              <span class="btn btn-outline" data-i18n="common.learnMore"></span>
            </a>

            <!-- past -->
            <h2 style="margin-top:var(--sp-9); margin-bottom:var(--sp-4)" data-i18n="events.past"></h2>

            <a class="event-row" href="https://mp.weixin.qq.com/s/vaTPoxDd-wVdoM9O0IqvJw" target="_blank" rel="noopener" data-reveal style="text-decoration:none; opacity:.85">
              <div class="event-date"><div class="day">2020</div><div class="mon" style="font-size:var(--fs-xs); letter-spacing:.1em">AUG</div></div>
              <div class="event-info">
                <span class="badge badge-mute" data-i18n="common.tagConference"></span>
                <h3 data-i18n="events.e5Title"></h3>
                <div class="meta"><span data-i18n="events.e5Meta"></span></div>
              </div>
              <span class="link" data-i18n="common.readMore"></span>
            </a>
          </div>

          <!-- filters -->
          <aside class="events-filters" data-reveal>
            <h4 data-i18n="events.filtersTitle"></h4>
            <div class="filter-group">
              <div class="label" style="font-size:var(--fs-sm); font-weight:600; margin-bottom:.5rem" data-i18n="events.fType"></div>
              <div class="filter-options">
                <label><input type="checkbox" checked> <span data-i18n="events.fAll"></span></label>
                <label><input type="checkbox"> <span data-i18n="events.fWebinar"></span></label>
                <label><input type="checkbox"> <span data-i18n="events.fWorkshop"></span></label>
                <label><input type="checkbox"> <span data-i18n="events.fConference"></span></label>
                <label><input type="checkbox"> <span data-i18n="events.fSocial"></span></label>
              </div>
            </div>
            <div class="filter-group">
              <div class="label" style="font-size:var(--fs-sm); font-weight:600; margin-bottom:.5rem" data-i18n="events.fFormat"></div>
              <div class="filter-options">
                <label><input type="checkbox" checked> <span data-i18n="events.fAll"></span></label>
                <label><input type="checkbox"> <span data-i18n="common.online"></span></label>
                <label><input type="checkbox"> <span data-i18n="common.inperson"></span></label>
                <label><input type="checkbox"> <span data-i18n="common.hybrid"></span></label>
              </div>
            </div>
          </aside>

        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
