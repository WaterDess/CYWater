<!DOCTYPE html>
<html lang="en" data-root="../">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>News — CYWater</title>
  <meta name="description" content="CYWater opportunities, research spotlights, and association announcements.">
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css?v=20260719-8">
  <link rel="stylesheet" href="../assets/css/components.css?v=20260719-8">
  <link rel="stylesheet" href="../assets/css/pages.css?v=20260719-8">
</head>
<body data-page="news">

  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow" style="color:var(--teal-soft)">News</span>
        <h1>Opportunities and spotlights.</h1>
        <p class="lead">Verified opportunities for the water-science community, together with research, event, and award spotlights from CYWater.</p>
      </div>
    </section>

    <section class="section">
      <div class="container container-narrow">
        <div id="news-main"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="../assets/js/content.js?v=20260719-8"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  (function () {
    "use strict";
    const A = window.CYWaterContent?.ARTICLES || {};
    const NL = window.CYWaterContent?.NEWS_LIST || [];
    const main = document.getElementById("news-main");
    if (!main || !NL.length) return;

    const esc = (value) => String(value || "").replace(/[&<>"]/g, (char) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;"
    })[char]);

    function renderMedia(item, article) {
      if (item.img) {
        return `<img src="../assets/img/${esc(item.img)}" alt="${esc(item.alt || article.title)}" loading="lazy">`;
      }
      const visual = item.visual || {};
      return `<span class="news-visual" role="img" aria-label="${esc(article.title)}">` +
        `<strong>${esc(visual.title || article.tag)}</strong>` +
        `<span class="news-visual-year">${esc(visual.year || article.date.slice(0, 4))}</span></span>`;
    }

    const spotlights = NL.map((item, index) => {
      const article = A[item.id];
      if (!article) return "";
      const href = `./article.html?id=${encodeURIComponent(item.id)}`;
      const media = renderMedia(item, article);
      if (index === 0) {
        return `<article class="news-feature" data-reveal>` +
          `<a href="${href}" class="card-media">${media}</a>` +
          `<div class="card-body"><div class="card-meta"><span class="card-tag">${esc(article.tag)}</span><span>${esc(article.date)}</span></div>` +
          `<h3 class="card-title"><a href="${href}">${esc(article.title)}</a></h3><p class="card-excerpt">${esc(article.lead)}</p>` +
          `<a class="link" href="${href}">Read spotlight</a></div></article>`;
      }
      return `<article class="news-item" data-reveal><a href="${href}" class="card-media">${media}</a>` +
        `<div><div class="card-meta"><span class="card-tag">${esc(article.tag)}</span><span>${esc(article.date)}</span></div>` +
        `<h3><a href="${href}">${esc(article.title)}</a></h3><p>${esc(article.lead)}</p></div></article>`;
    });
    const featured = spotlights[0] || "";
    const remaining = spotlights.slice(1).join("");

    main.innerHTML =
      `<section id="opportunities" aria-labelledby="opportunities-title">` +
        `<div class="section-head"><span class="eyebrow">Open calls and positions</span><h2 id="opportunities-title">Opportunities</h2></div>` +
        `<div class="opportunities-empty" data-reveal><strong>No verified opportunities are currently published.</strong>` +
        `<p>Historical listings are being reviewed before republication so that closed or outdated positions are not presented as active.</p></div>` +
      `</section>` +
      `<section id="spotlights" class="news-section-block" aria-labelledby="spotlights-title">` +
        `<div class="section-head"><span class="eyebrow">Research and community</span><h2 id="spotlights-title">Spotlights</h2></div>` +
        `<div>${featured}<div class="news-list">${remaining}</div></div>` +
      `</section>`;

    window.CYWaterReveal?.refresh(main);
  })();
  </script>
</body>
</html>
