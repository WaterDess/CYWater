<!DOCTYPE html>
<html lang="en" data-root="../">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Article — CYWater</title>
  <meta name="description" content="CYWater news and announcements.">
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-page="news">

  <div id="site-header"></div>

  <main id="article-main">
    <!-- article-hero and body are injected by renderArticle() -->
  </main>

  <div id="site-footer"></div>
  <script src="../assets/js/content.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  /* ---------- Render an article from ?id= ---------- */
  (function () {
    "use strict";
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const A = window.CYWaterContent?.ARTICLES || {};
    const data = A[id];

    const main = document.getElementById("article-main");

    // Missing or unknown id → redirect to news list
    if (!data) {
      window.location.replace("./index.html");
      return;
    }

    // Update document title
    document.title = data.title + " — CYWater";

    // Escape helper
    function esc(s) {
      return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    // Render a block to HTML
    function renderBlock(b) {
      switch (b.type) {
        case "p":      return '<p>' + b.text + '</p>';
        case "h2":     return '<h2>' + b.text + '</h2>';
        case "h3":     return '<h3>' + b.text + '</h3>';
        case "quote":  return '<blockquote>' + b.text + '</blockquote>';
        case "list":   return '<ul>' + b.items.map((i) => '<li>' + i + '</li>').join('') + '</ul>';
        case "figure": return '<figure><img src="../assets/img/' + b.src + '" alt="' + esc(b.caption || '') + '" loading="lazy">' + (b.caption ? '<figcaption>' + b.caption + '</figcaption>' : '') + '</figure>';
        case "gallery": return '<div class="article-gallery">' + b.items.map((it) => '<figure' + (it.wide ? ' class="is-wide"' : '') + '><img src="../assets/img/' + it.src + '" alt="' + esc(it.caption || '') + '" loading="lazy">' + (it.caption ? '<figcaption>' + it.caption + '</figcaption>' : '') + '</figure>').join('') + '</div>';
        default:       return '';
      }
    }

    // Compose the page
    const sourceHtml = data.source
      ? '<a class="btn btn-outline btn-lg" href="' + esc(data.source) + '" target="_blank" rel="noopener">View source announcement</a>'
      : '';

    main.innerHTML =
      '<section class="article-hero">' +
        '<div class="container container-narrow">' +
          '<div class="crumbs">' +
            '<a href="../index.html">Home</a><span>/</span>' +
            '<a href="./index.html">News</a>' +
          '</div>' +
          '<div class="meta">' +
            '<span class="badge badge-teal">' + esc(data.tag) + '</span>' +
            '<span>' + esc(data.date) + '</span>' +
          '</div>' +
          '<h1>' + esc(data.title) + '</h1>' +
          '<p class="lead" style="margin-top:var(--sp-4)">' + data.lead + '</p>' +
        '</div>' +
      '</section>' +
      '<section class="section">' +
        '<div class="container container-narrow">' +
          '<div class="article-body">' +
            '<div class="prose" data-reveal>' +
              data.blocks.map(renderBlock).join('') +
            '</div>' +
            (sourceHtml ? '<hr class="divider" style="margin:var(--sp-7) 0"><div style="text-align:center">' + sourceHtml + '</div>' : '') +
            '<div style="text-align:center; margin-top:var(--sp-6)">' +
              '<a class="link" href="./index.html">Back to News</a>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</section>';

    window.CYWaterReveal?.refresh(main);
  })();
  </script>
</body>
</html>
