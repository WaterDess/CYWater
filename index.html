<!DOCTYPE html>
<html lang="en" data-root="./">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYWater — Advancing water science & community</title>
  <meta name="description" content="A bilingual association connecting water researchers, practitioners and students across China and the international community.">
  <link rel="icon" type="image/png" href="./assets/img/logo.png">
  <meta property="og:title" content="CYWater — Advancing water science & community">
  <meta property="og:description" content="A bilingual association for water researchers, practitioners and students.">
  <meta property="og:image" content="./assets/img/logo.png">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./assets/css/base.css">
  <link rel="stylesheet" href="./assets/css/components.css">
  <link rel="stylesheet" href="./assets/css/pages.css">
</head>
<body data-page="home">

  <div id="site-header"></div>

  <main>
    <!-- ============ HERO ============ -->
    <section class="hero">
      <div class="container">
        <svg class="hero-watermark" viewBox="0 0 200 200" aria-hidden="true">
          <path d="M100 20C100 20 40 80 40 130a60 60 0 0 0 120 0C160 80 100 20 100 20Z" fill="none" stroke="#0F766E" stroke-width="2"/>
        </svg>
        <div class="hero-inner" data-reveal>
          <span class="eyebrow" data-i18n="home.heroEyebrow"></span>
          <h1 data-i18n="home.heroTitle"></h1>
          <p class="lead" data-i18n="home.heroLead"></p>
          <div class="hero-actions">
            <a class="btn btn-accent btn-lg" href="./membership/index.html" data-i18n="home.heroCta1"></a>
            <a class="btn btn-outline btn-lg" href="./journal/index.html" data-i18n="home.heroCta2"></a>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ HIGHLIGHT STRIP ============ -->
    <section class="section-tight">
      <div class="container">
        <div class="highlight-strip" data-reveal>
          <div class="stat">
            <div class="stat-num">620+</div>
            <div class="stat-label" data-i18n="home.statMembers"></div>
          </div>
          <div class="stat">
            <div class="stat-num">18</div>
            <div class="stat-label" data-i18n="home.statCountries"></div>
          </div>
          <div class="stat">
            <div class="stat-num">24</div>
            <div class="stat-label" data-i18n="home.statEvents"></div>
          </div>
          <div class="stat">
            <div class="stat-num">140+</div>
            <div class="stat-label" data-i18n="home.statPapers"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ MISSION BAND ============ -->
    <section class="section mission-band">
      <div class="container">
        <div class="mission-grid">
          <div data-reveal>
            <span class="eyebrow" data-i18n="home.missionEyebrow"></span>
            <h2 style="margin-top:var(--sp-3); color:var(--white)" data-i18n="home.missionTitle"></h2>
            <p class="lead" style="color:rgba(255,255,255,.78); margin-top:var(--sp-4)" data-i18n="home.missionLead"></p>
          </div>
          <div class="mission-stats" data-reveal>
            <div class="stat">
              <div class="stat-num">2011</div>
              <div class="stat-label" style="color:rgba(255,255,255,.6)" data-i18n="home.statFounded"></div>
            </div>
            <div class="stat">
              <div class="stat-num">100%</div>
              <div class="stat-label" style="color:rgba(255,255,255,.6)" data-i18n="home.statMemberRun"></div>
            </div>
            <div class="stat">
              <div class="stat-num">2</div>
              <div class="stat-label" style="color:rgba(255,255,255,.6)" data-i18n="home.statLanguages"></div>
            </div>
            <div class="stat">
              <div class="stat-num">OA</div>
              <div class="stat-label" style="color:rgba(255,255,255,.6)" data-i18n="home.statOpenAccess"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ PILLARS ============ -->
    <section class="section pillars">
      <div class="container">
        <div class="section-head center" data-reveal>
          <span class="eyebrow center" data-i18n="home.pillarsEyebrow"></span>
          <h2 data-i18n="home.pillarsTitle"></h2>
        </div>
        <div class="grid grid-4">
          <div class="feature" data-reveal>
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h12a4 4 0 0 1 4 4v12H8a4 4 0 0 1-4-4Z"/><path d="M4 4v12a4 4 0 0 0 4 4"/><path d="M8 9h8M8 13h5"/></svg>
            </div>
            <h3 data-i18n="home.pillar1T"></h3>
            <p data-i18n="home.pillar1D"></p>
            <a class="link" href="./journal/index.html" data-i18n="common.learnMore"></a>
          </div>
          <div class="feature" data-reveal>
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/><path d="m9 14 2 2 4-4"/></svg>
            </div>
            <h3 data-i18n="home.pillar2T"></h3>
            <p data-i18n="home.pillar2D"></p>
            <a class="link" href="./events/index.html" data-i18n="common.learnMore"></a>
          </div>
          <div class="feature" data-reveal>
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.5"/><path d="M2 21a7 7 0 0 1 14 0"/><circle cx="17" cy="10" r="2.5"/><path d="M15 21a5 5 0 0 1 7-4.5"/></svg>
            </div>
            <h3 data-i18n="home.pillar3T"></h3>
            <p data-i18n="home.pillar3D"></p>
            <a class="link" href="./membership/index.html" data-i18n="common.learnMore"></a>
          </div>
          <div class="feature" data-reveal>
            <div class="feature-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="5"/><path d="m9 13-2 8 5-3 5 3-2-8"/></svg>
            </div>
            <h3 data-i18n="home.pillar4T"></h3>
            <p data-i18n="home.pillar4D"></p>
            <a class="link" href="./membership/index.html" data-i18n="common.learnMore"></a>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ FOCUS AREAS ============ -->
    <section class="section section-tint">
      <div class="container">
        <div class="section-head center" data-reveal>
          <span class="eyebrow center" data-i18n="home.focusEyebrow"></span>
          <h2 data-i18n="home.focusTitle"></h2>
        </div>
        <div class="tag-list" style="justify-content:center" data-reveal>
          <span class="badge badge-teal" data-i18n="home.focus1"></span>
          <span class="badge badge-teal" data-i18n="home.focus2"></span>
          <span class="badge badge-teal" data-i18n="home.focus3"></span>
          <span class="badge badge-teal" data-i18n="home.focus4"></span>
          <span class="badge badge-teal" data-i18n="home.focus5"></span>
          <span class="badge badge-teal" data-i18n="home.focus6"></span>
          <span class="badge badge-teal" data-i18n="home.focus7"></span>
          <span class="badge badge-teal" data-i18n="home.focus8"></span>
          <span class="badge badge-teal" data-i18n="home.focus9"></span>
          <span class="badge badge-teal" data-i18n="home.focus10"></span>
        </div>
      </div>
    </section>

    <!-- ============ LATEST ============ -->
    <section class="section">
      <div class="container">
        <div class="latest-head" data-reveal>
          <div class="section-head" style="margin-bottom:0">
            <span class="eyebrow" data-i18n="home.latestEyebrow"></span>
            <h2 data-i18n="home.latestTitle"></h2>
          </div>
          <a class="btn btn-outline" href="./news/index.html" data-i18n="common.viewAll"></a>
        </div>
        <div class="grid grid-3">
          <article class="card" data-reveal>
            <a href="./news/article.html">
              <div class="card-media"><img src="./assets/img/photos/water-aerial.jpg" alt="" loading="lazy"></div>
            </a>
            <div class="card-body">
              <div class="card-meta"><span class="card-tag" data-i18n="common.tagResearch"></span><span>· 2026-06-12</span></div>
              <h3 class="card-title"><a href="./news/article.html"><span data-i18n="news.n1Title"></span></a></h3>
              <p class="card-excerpt" data-i18n="news.n1Excerpt"></p>
              <a class="link" href="./news/article.html" data-i18n="common.readMore"></a>
            </div>
          </article>
          <article class="card" data-reveal>
            <a href="./news/article.html">
              <div class="card-media"><img src="./assets/img/photos/audience-talk.jpg" alt="" loading="lazy"></div>
            </a>
            <div class="card-body">
              <div class="card-meta"><span class="card-tag" data-i18n="common.tagEvent"></span><span>· 2026-06-20</span></div>
              <h3 class="card-title"><a href="./events/detail.html"><span data-i18n="news.n2Title"></span></a></h3>
              <p class="card-excerpt" data-i18n="news.n2Excerpt"></p>
              <a class="link" href="./events/detail.html" data-i18n="common.register"></a>
            </div>
          </article>
          <article class="card" data-reveal>
            <a href="./news/article.html">
              <div class="card-media"><img src="./assets/img/photos/underwater-blue.jpg" alt="" loading="lazy"></div>
            </a>
            <div class="card-body">
              <div class="card-meta"><span class="card-tag" data-i18n="common.tagCommunity"></span><span>· 2026-06-28</span></div>
              <h3 class="card-title"><a href="./news/article.html"><span data-i18n="news.n3Title"></span></a></h3>
              <p class="card-excerpt" data-i18n="news.n3Excerpt"></p>
              <a class="link" href="./news/article.html" data-i18n="common.readMore"></a>
            </div>
          </article>
        </div>
      </div>
    </section>

    <!-- ============ CTA ============ -->
    <section class="section">
      <div class="container">
        <div class="cta-band" data-reveal>
          <span class="eyebrow" style="color:var(--teal-soft)" data-i18n="nav.membership"></span>
          <h2 style="margin-top:var(--sp-3)" data-i18n="home.ctaTitle"></h2>
          <p class="lead" data-i18n="home.ctaLead"></p>
          <div class="hero-actions" style="margin-top:var(--sp-5)">
            <a class="btn btn-primary btn-lg" href="./membership/index.html" data-i18n="nav.join"></a>
            <a class="btn btn-ghost btn-lg" href="./contact/index.html" style="color:#fff" data-i18n="nav.contact"></a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="./assets/js/i18n.js"></script>
  <script src="./assets/js/layout.js"></script>
  <script src="./assets/js/main.js"></script>
</body>
</html>
