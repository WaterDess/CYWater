<!DOCTYPE html>
<html lang="en" data-root="../">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal — CYWater</title>
  <meta name="description" content="The CYWater Journal — open, bilingual, peer-reviewed water science.">
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
</head>
<body data-page="journal">

  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow" style="color:var(--teal-soft)" data-i18n="journal.heroEyebrow"></span>
        <h1 data-i18n="journal.heroTitle"></h1>
        <p class="lead" data-i18n="journal.heroLead"></p>
      </div>
    </section>

    <!-- current issue -->
    <section class="section">
      <div class="container">
        <div class="latest-head" data-reveal>
          <div class="section-head" style="margin-bottom:0">
            <span class="eyebrow" data-i18n="journal.latest"></span>
            <h2 data-i18n="journal.currentIssue"></h2>
          </div>
          <a class="btn btn-accent" href="#" onclick="event.preventDefault(); window.CYWaterToast && window.CYWaterToast(window.CYWaterI18N.t('common.protoSubmit'))" data-i18n="journal.submit"></a>
        </div>

        <div class="journal-grid">
          <article class="journal-card" data-reveal>
            <div class="journal-vol" data-i18n="common.tagResearchArt"></div>
            <h3 data-i18n="journal.j1Title"></h3>
            <p class="card-excerpt" data-i18n="journal.j1Excerpt"></p>
            <a class="link" href="../news/article.html" data-i18n="common.readMore"></a>
            <div class="journal-meta">Yan Liu et al. · 14 pp · EN / 中文</div>
          </article>
          <article class="journal-card" data-reveal>
            <div class="journal-vol" data-i18n="common.tagReview"></div>
            <h3 data-i18n="journal.j2Title"></h3>
            <p class="card-excerpt" data-i18n="journal.j2Excerpt"></p>
            <a class="link" href="../news/article.html" data-i18n="common.readMore"></a>
            <div class="journal-meta">Mei Gao et al. · 28 pp · EN / 中文</div>
          </article>
          <article class="journal-card" data-reveal>
            <div class="journal-vol" data-i18n="common.tagResearchArt"></div>
            <h3 data-i18n="journal.j3Title"></h3>
            <p class="card-excerpt" data-i18n="journal.j3Excerpt"></p>
            <a class="link" href="../news/article.html" data-i18n="common.readMore"></a>
            <div class="journal-meta">Xuan Zhang et al. · 19 pp · EN / 中文</div>
          </article>
          <article class="journal-card" data-reveal>
            <div class="journal-vol" data-i18n="common.tagPerspective"></div>
            <h3 data-i18n="journal.j4Title"></h3>
            <p class="card-excerpt" data-i18n="journal.j4Excerpt"></p>
            <a class="link" href="../news/article.html" data-i18n="common.readMore"></a>
            <div class="journal-meta">Lin Zhao · 6 pp · EN / 中文</div>
          </article>
          <article class="journal-card" data-reveal>
            <div class="journal-vol" data-i18n="common.tagResearchArt"></div>
            <h3 data-i18n="journal.j5Title"></h3>
            <p class="card-excerpt" data-i18n="journal.j5Excerpt"></p>
            <a class="link" href="../news/article.html" data-i18n="common.readMore"></a>
            <div class="journal-meta">Tom Fischer et al. · 16 pp · EN / 中文</div>
          </article>
          <article class="journal-card" data-reveal>
            <div class="journal-vol" data-i18n="common.tagDataPaper"></div>
            <h3 data-i18n="journal.j6Title"></h3>
            <p class="card-excerpt" data-i18n="journal.j6Excerpt"></p>
            <a class="link" href="../news/article.html" data-i18n="common.readMore"></a>
            <div class="journal-meta">Yan Liu, Xuan Zhang · dataset · EN / 中文</div>
          </article>
        </div>
      </div>
    </section>

    <!-- submit CTA -->
    <section class="section section-tint">
      <div class="container container-narrow" style="text-align:center">
        <span class="eyebrow center" data-i18n="journal.submit"></span>
        <h2 style="margin-top:var(--sp-3)" data-i18n="journal.submit"></h2>
        <p class="lead" style="margin-top:var(--sp-3)" data-i18n="journal.submitLead"></p>
        <div class="hero-actions" style="justify-content:center; margin-top:var(--sp-5)">
          <a class="btn btn-accent btn-lg" href="#" onclick="event.preventDefault(); window.CYWaterToast && window.CYWaterToast(window.CYWaterI18N.t('common.protoSubmit'))" data-i18n="journal.submit"></a>
          <a class="btn btn-outline btn-lg" href="../membership/index.html" data-i18n="nav.join"></a>
        </div>
      </div>
    </section>

    <!-- archive -->
    <section class="section">
      <div class="container">
        <div class="section-head" data-reveal>
          <span class="eyebrow" data-i18n="journal.archive"></span>
          <h2 data-i18n="journal.archive"></h2>
        </div>
        <div class="table-wrap" data-reveal>
          <table class="table">
            <thead>
              <tr><th data-i18n="common.colVolume"></th><th data-i18n="common.colIssue"></th><th data-i18n="common.colDate"></th><th data-i18n="common.colTheme"></th><th data-i18n="common.colArticles"></th></tr>
            </thead>
            <tbody>
              <tr><td>3</td><td>2</td><td>Jun 2026</td><td data-i18n="journal.archTheme1"></td><td>12</td></tr>
              <tr><td>3</td><td>1</td><td>Mar 2026</td><td data-i18n="journal.archTheme2"></td><td>10</td></tr>
              <tr><td>2</td><td>2</td><td>Sep 2025</td><td data-i18n="journal.archTheme3"></td><td>11</td></tr>
              <tr><td>2</td><td>1</td><td>Mar 2025</td><td data-i18n="journal.archTheme4"></td><td>9</td></tr>
              <tr><td>1</td><td>2</td><td>Sep 2024</td><td data-i18n="journal.archInaugural"></td><td>8</td></tr>
              <tr><td>1</td><td>1</td><td>Apr 2024</td><td data-i18n="journal.archInaugural"></td><td>7</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
