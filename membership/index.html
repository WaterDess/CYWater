<!DOCTYPE html>
<html lang="en" data-root="../">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membership — CYWater</title>
  <meta name="description" content="Join CYWater — open to researchers, practitioners and students in any water-related field.">
  <link rel="icon" type="image/png" href="../assets/img/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
  <style>
    .faq-item { border-bottom: 1px solid var(--line); }
    .faq-item:first-child { border-top: 1px solid var(--line); }
    .faq-q { display: flex; justify-content: space-between; align-items: center; gap: var(--sp-3); padding: var(--sp-4) 0; cursor: pointer; font-weight: 600; font-family: var(--font-body); }
    .faq-q::after { content: "+"; font-size: 1.4rem; color: var(--teal); transition: transform var(--dur) var(--ease); }
    .faq-item.is-open .faq-q::after { transform: rotate(45deg); }
    .faq-a { max-height: 0; overflow: hidden; transition: max-height var(--dur) var(--ease); }
    .faq-item.is-open .faq-a { max-height: 300px; }
    .faq-a p { padding-bottom: var(--sp-4); font-size: var(--fs-sm); }
  </style>
</head>
<body data-page="membership">

  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow" style="color:var(--teal-soft)" data-i18n="membership.heroEyebrow"></span>
        <h1 data-i18n="membership.heroTitle"></h1>
        <p class="lead" data-i18n="membership.heroLead"></p>
      </div>
    </section>

    <!-- prototype notice -->
    <section class="section-tight">
      <div class="container container-narrow">
        <div class="prototype-notice" data-reveal>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>
          <div>
            <strong data-i18n="common.prototypeNote"></strong>
            <span style="display:block; margin-top:.2rem" data-i18n="common.protoMsg"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Benefits -->
    <section class="section">
      <div class="container">
        <div class="section-head center" data-reveal>
          <span class="eyebrow center" data-i18n="membership.benefitsEyebrow"></span>
          <h2 data-i18n="membership.benefitsTitle"></h2>
        </div>
        <div class="benefits-grid grid-3">
          <div class="feature" data-reveal>
            <div class="feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg></div>
            <h3 style="font-size:var(--fs-md)" data-i18n="membership.b1T"></h3>
            <p data-i18n="membership.b1D"></p>
          </div>
          <div class="feature" data-reveal>
            <div class="feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h12a4 4 0 0 1 4 4v12H8a4 4 0 0 1-4-4Z"/><path d="M8 9h8M8 13h5"/></svg></div>
            <h3 style="font-size:var(--fs-md)" data-i18n="membership.b2T"></h3>
            <p data-i18n="membership.b2D"></p>
          </div>
          <div class="feature" data-reveal>
            <div class="feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.5"/><path d="M2 21a7 7 0 0 1 14 0"/><circle cx="17" cy="10" r="2.5"/></svg></div>
            <h3 style="font-size:var(--fs-md)" data-i18n="membership.b3T"></h3>
            <p data-i18n="membership.b3D"></p>
          </div>
          <div class="feature" data-reveal>
            <div class="feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="5"/><path d="m9 13-2 8 5-3 5 3-2-8"/></svg></div>
            <h3 style="font-size:var(--fs-md)" data-i18n="membership.b4T"></h3>
            <p data-i18n="membership.b4D"></p>
          </div>
          <div class="feature" data-reveal>
            <div class="feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg></div>
            <h3 style="font-size:var(--fs-md)" data-i18n="membership.b5T"></h3>
            <p data-i18n="membership.b5D"></p>
          </div>
          <div class="feature" data-reveal>
            <div class="feature-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 3v18l2-1 2 1 2-1 2 1 2-1 2 1V3l-2 1-2-1-2 1-2-1-2 1Z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg></div>
            <h3 style="font-size:var(--fs-md)" data-i18n="membership.b6T"></h3>
            <p data-i18n="membership.b6D"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- Tiers -->
    <section class="section section-tint">
      <div class="container">
        <div class="section-head center" data-reveal>
          <span class="eyebrow center" data-i18n="membership.tiersEyebrow"></span>
          <h2 data-i18n="membership.tiersTitle"></h2>
          <p class="lead" data-i18n="membership.tiersLead"></p>
        </div>

        <div class="tiers">
          <!-- Student -->
          <div class="tier" data-reveal>
            <h3 data-i18n="membership.tierStudent"></h3>
            <p class="tier-tag" data-i18n="membership.tierStudentTag"></p>
            <div class="tier-price">$15 <small data-i18n="membership.perYear"></small></div>
            <p class="tier-cycle" data-i18n="membership.tierStudentD"></p>
            <ul class="tier-features">
              <li data-i18n="membership.b1T"></li>
              <li data-i18n="membership.b2T"></li>
              <li data-i18n="membership.b3T"></li>
              <li data-i18n="membership.b4T"></li>
              <li data-i18n="membership.b5T"></li>
            </ul>
            <form data-proto-form="join"><button class="btn btn-outline btn-block" data-i18n="nav.join"></button></form>
          </div>

          <!-- Regular (featured) -->
          <div class="tier tier-featured" data-reveal>
            <span class="badge badge-teal tier-badge" data-i18n="membership.tierRegularTag"></span>
            <h3 data-i18n="membership.tierRegular"></h3>
            <p class="tier-tag" data-i18n="membership.tierRegularD"></p>
            <div class="tier-price">$45 <small data-i18n="membership.perYear"></small></div>
            <p class="tier-cycle" data-i18n="membership.tierRegularD"></p>
            <ul class="tier-features">
              <li data-i18n="membership.b1T"></li>
              <li data-i18n="membership.b2T"></li>
              <li data-i18n="membership.b3T"></li>
              <li data-i18n="membership.b4T"></li>
              <li data-i18n="membership.b5T"></li>
              <li data-i18n="membership.b6T"></li>
            </ul>
            <form data-proto-form="join"><button class="btn btn-accent btn-block" data-i18n="nav.join"></button></form>
          </div>

          <!-- Sustaining -->
          <div class="tier" data-reveal>
            <span class="badge badge-gold tier-badge" data-i18n="membership.tierSustainingTag"></span>
            <h3 data-i18n="membership.tierSustaining"></h3>
            <p class="tier-tag" data-i18n="membership.tierSustainingD"></p>
            <div class="tier-price">$150 <small data-i18n="membership.perYear"></small></div>
            <p class="tier-cycle" data-i18n="membership.tierSustainingD"></p>
            <ul class="tier-features">
              <li data-i18n="membership.b1T"></li>
              <li data-i18n="membership.b2T"></li>
              <li data-i18n="membership.b3T"></li>
              <li data-i18n="membership.b4T"></li>
              <li data-i18n="membership.b5T"></li>
              <li data-i18n="membership.b6T"></li>
            </ul>
            <form data-proto-form="join"><button class="btn btn-outline btn-block" data-i18n="nav.join"></button></form>
          </div>
        </div>
      </div>
    </section>

    <!-- FAQ -->
    <section class="section">
      <div class="container container-narrow">
        <div class="section-head center" data-reveal>
          <span class="eyebrow center" data-i18n="membership.faqEyebrow"></span>
          <h2 data-i18n="membership.faqTitle"></h2>
        </div>
        <div data-reveal>
          <div class="faq-item is-open">
            <div class="faq-q" aria-expanded="true" data-i18n="membership.faq1Q"></div>
            <div class="faq-a"><p data-i18n="membership.faq1A"></p></div>
          </div>
          <div class="faq-item">
            <div class="faq-q" aria-expanded="false" data-i18n="membership.faq2Q"></div>
            <div class="faq-a"><p data-i18n="membership.faq2A"></p></div>
          </div>
          <div class="faq-item">
            <div class="faq-q" aria-expanded="false" data-i18n="membership.faq3Q"></div>
            <div class="faq-a"><p data-i18n="membership.faq3A"></p></div>
          </div>
          <div class="faq-item">
            <div class="faq-q" aria-expanded="false" data-i18n="membership.faq4Q"></div>
            <div class="faq-a"><p data-i18n="membership.faq4A"></p></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
